# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: bazzite-cachyos
description: Bazzite Deck GNOME with the CachyOS kernel and commonly-layered packages baked in.
base-image: ghcr.io/ublue-os/bazzite-deck-gnome
image-version: stable

modules:
  # Kernel swap is done via a shell script because rpm-ostree's kernel-install
  # + dracut hooks fire during the kernel install before depmod has populated
  # modules.dep. The script stubs those hooks, swaps the kernel, and then
  # generates the initramfs manually. See files/scripts/install-cachyos-kernel.sh.
  - type: script
    scripts:
      - install-cachyos-kernel.sh

  # Bake in the packages I'd otherwise rpm-ostree-layer on the host.
  - type: rpm-ostree
    install:
      - cockpit
      - cockpit-machines
      - corectrl
      - hwloc-devel
      - libstdc++-static
      - libuv-static
      - rocm-hip
      - virt-manager

  - type: signing
